        const accent = hostAccent(host.host_id);
        const title = display(session.last_prompt || session.last_response || session.last_event);
        const agent = `${display(session.platform)} / ${display(session.source)}`;
        const project = display(session.project_name || session.cwd);
        const sessionId = display(session.session_id || session.key);
        const terminal = session.screen_session
          ? `screen ${session.screen_session}`
          : [session.tmux_session, session.tmux_window, session.tmux_pane].filter(Boolean).join(":") || session.tty || "";
        const process = session.pid ? `pid ${session.pid}` : "";
        const meta = [session.model, terminal, process].filter(Boolean).join(" | ");
        const copied = state.copied === session.key ? " copied" : "";
        const resume = session.resume_command || "";

        return `
          <tr>
            <td class="col-status" data-label="Status">
              <span class="status ${escapeHtml(session.status || "")}">${escapeHtml(display(session.status))}</span>
              <div class="confidence">${escapeHtml(display(session.confidence, "confidence unknown"))}</div>
            </td>
            <td class="col-host" data-label="Host">
              <div class="host-title" style="--host-accent: ${escapeHtml(accent)}">
                <span class="host-dot" aria-hidden="true"></span>
                <span class="host-name">${escapeHtml(display(host.host_label, host.host_id))}</span>
              </div>
              <div class="mini">${escapeHtml(host.host_id || "")}</div>
            </td>
            <td class="col-agent" data-label="Agent">
              <div class="primary" title="${escapeHtml(agent)}">${escapeHtml(agent)}</div>
              <div class="mini" title="${escapeHtml(meta)}">${escapeHtml(meta || "no process detail")}</div>
            </td>
            <td class="col-session" data-label="Session">
              <div class="primary" title="${escapeHtml(project)}">${escapeHtml(project)}</div>
              <div class="mini" title="${escapeHtml(sessionId)}">${escapeHtml(sessionId)}</div>
            </td>
            <td class="col-activity" data-label="Activity">
              <div class="activity" title="${escapeHtml(title)}">${escapeHtml(title)}</div>
              <div class="mini" title="${escapeHtml(session.cwd || session.transcript_path || "")}">
                ${escapeHtml(session.cwd || session.transcript_path || "no path")}
              </div>
            </td>
            <td class="col-resume" data-label="Resume">
              <button class="button compact" type="button" data-detail="${escapeHtml(session.key)}">
                Open
              </button>
              <button class="button compact${copied}" type="button" data-copy="${escapeHtml(resume)}" data-key="${escapeHtml(session.key)}" ${resume ? "" : "disabled"}>
                ${copied ? "Copied" : "Copy"}
              </button>
            </td>
          </tr>
          ${renderDetails(host, session, accent)}
        `;
      }).join("");

      const table = rows ? `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="col-status">Status</th>
                <th class="col-host">Host</th>
                <th class="col-agent">Platform / source</th>
                <th class="col-session">Project / session</th>
                <th class="col-activity">Latest activity</th>
                <th class="col-resume">Resume</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      ` : `<div class="empty-host">No sessions match the current filters.</div>`;

      els.hosts.innerHTML = `
        ${hostErrors ? `<div class="host-errors">${hostErrors}</div>` : ""}
        ${table}
      `;
    }

    function render() {
      const hosts = visibleHosts();
      const onSessionPage = Boolean(state.routeSessionKey);
      document.body.classList.toggle("session-route", onSessionPage);
      els.topbar.hidden = onSessionPage;
      els.counts.hidden = onSessionPage;
      els.controls.hidden = onSessionPage;
      els.newSessionPanel.hidden = onSessionPage;
      els.hosts.hidden = onSessionPage;
      els.addPanel.hidden = onSessionPage;
      renderCounts();
      renderAddPanel();
      renderMessage(hosts);
      if (onSessionPage && !state.error) els.message.hidden = true;
      renderNewSession();
      renderHosts(hosts);
      renderSessionPage();
      els.refresh.disabled = state.loading || state.refreshing;
      els.refresh.textContent = state.loading ? "Refreshing" : "Refresh";
      els.updated.textContent = state.loadedAt ? `Updated ${state.loadedAt.toLocaleTimeString()}` : "Not loaded";
      els.notifyCompleted.checked = state.notifyCompleted;
    }

    async function copyText(text, key) {
      if (!text) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const area = document.createElement("textarea");
          area.value = text;
          area.style.position = "fixed";
          area.style.left = "-9999px";
          document.body.appendChild(area);
          area.focus();
          area.select();
          document.execCommand("copy");
          area.remove();
        }
        state.copied = key;
        render();
        window.setTimeout(() => {
          if (state.copied === key) {
            state.copied = "";
            render();
          }
        }, 1400);
      } catch (error) {
        state.error = `Could not copy resume command: ${error.message}`;
        render();
      }
    }

    async function load({ refresh = false, quiet = false } = {}) {
      if (state.loading || state.refreshing) return;
      state.loading = !quiet;
      state.refreshing = quiet;
      if (!quiet) state.error = "";
      render();
      try {
        const response = await fetch(apiUrl(refresh), { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Snapshot request failed with HTTP ${response.status}`);
        const data = await response.json();
        const hosts = Array.isArray(data.hosts) ? data.hosts : [];
        detectCompletedSessions(hosts);
        state.hosts = hosts;
        state.counts = data.counts || {};
        state.loadedAt = new Date();
        state.error = "";
      } catch (error) {
        if (!quiet) state.error = `Unable to load /agent-console/api/snapshot. ${error.message}`;
      } finally {
        state.loading = false;
        state.refreshing = false;
        render();
      }
    }

    async function loadCandidates() {
      state.addOpen = true;
      render();
      try {
        const response = await fetch(apiUrl(false, "/api/vscode-hosts"), { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Host discovery failed with HTTP ${response.status}`);
        const data = await response.json();
        state.candidates = Array.isArray(data.hosts) ? data.hosts : [];
      } catch (error) {
        state.error = `Unable to load VS Code SSH hosts. ${error.message}`;
      }
      render();
    }

    async function loadConfiguredHosts(openPanel = true) {
      if (openPanel) state.addOpen = true;
      render();
      try {
        const response = await fetch(apiUrl(false, "/api/hosts"), { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Host list failed with HTTP ${response.status}`);
        const data = await response.json();
        state.configuredHosts = Array.isArray(data.hosts) ? data.hosts : [];
      } catch (error) {
        state.error = `Unable to load configured hosts. ${error.message}`;
      }
      render();
    }

    function resetHostForm() {
      state.editingHostId = "";
      els.hostId.value = "";
      els.hostLabel.value = "";
      els.hostSsh.value = "";
      els.hostPort.value = "";
      els.hostPassword.value = "";
      els.hostActions.checked = false;
      render();
    }

    function editHost(id) {
      const host = state.configuredHosts.find((row) => row.id === id);
      if (!host || host.id === "local" || host.type === "local") return;
      const sshTarget = splitSshTarget(host.ssh || "");
      state.editingHostId = host.id;
      els.hostId.value = host.id || "";
      els.hostLabel.value = host.label || host.id || "";
      els.hostSsh.value = sshTarget.ssh;
      els.hostPort.value = sshTarget.port;
      els.hostPassword.value = "";
      els.hostActions.checked = Boolean(host.enable_actions);
      render();
    }

    async function deleteConfiguredHost(id) {
      const host = state.configuredHosts.find((row) => row.id === id);
      if (!host || host.id === "local" || host.type === "local") return;
      if (!window.confirm(`Delete server ${host.label || host.id}? Local password and monitoring config will be removed.`)) return;
      state.deletingHost = id;
      render();
      try {
        const response = await fetch(apiUrl(false, `/api/hosts/${encodeURIComponent(id)}`), {
          method: "DELETE",
          headers: { "Accept": "application/json" },
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Delete failed with HTTP ${response.status}`);
        }
        const data = await response.json();
        state.configuredHosts = Array.isArray(data.hosts) ? data.hosts : [];
        if (state.editingHostId === id) resetHostForm();
        await load({ refresh: true });
      } catch (error) {
        state.error = `Unable to delete host. ${error.message}`;
      } finally {
        state.deletingHost = "";
        render();
      }
    }

    async function startRemoteCodexSession() {
      const hostId = state.newSessionHost || els.newHost.value;
      if (!hostId) {
        state.error = "Choose a remote host first.";
        render();
        return;
      }
      state.startingSession = true;
      state.startSessionStatus = "";
      state.error = "";
      render();
      try {
        const response = await fetch(apiUrl(false, `/api/hosts/${encodeURIComponent(hostId)}/screen-session`), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({
            cwd: state.newSessionCwd || "~",
            screen_name: state.newSessionScreen || null,
          }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Start failed with HTTP ${response.status}`);
        }
        const data = await response.json();
        const screen = data.screen || {};
        state.newSessionScreen = "";
        state.startSessionStatus = `Started ${screen.screen_session || "remote screen"} on ${hostId}.`;
        await new Promise((resolve) => window.setTimeout(resolve, 1200));
        await load({ refresh: true, quiet: true });
      } catch (error) {
        state.error = `Unable to start remote Codex session. ${error.message}`;
      } finally {
        state.startingSession = false;
        render();
      }
    }

    async function saveHost() {
      const port = els.hostPort.value.trim();
      if (port && !/^\d+$/.test(port)) {
        state.error = "Port must be numeric when provided.";
        render();
        return;
      }
      const payload = {
        id: els.hostId.value.trim(),
        label: els.hostLabel.value.trim() || els.hostId.value.trim(),
        ssh: composeSshTarget(els.hostSsh.value, port),
        password: els.hostPassword.value,
        enable_actions: els.hostActions.checked,
      };
      if (!payload.id || !payload.ssh) {
        state.error = "Host id and SSH target are required.";
        render();
        return;
      }
      state.savingHost = true;
      state.error = "";
      render();
      try {
        const response = await fetch(apiUrl(false, "/api/hosts"), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Save failed with HTTP ${response.status}`);
        }
        const data = await response.json();
        state.configuredHosts = Array.isArray(data.hosts) ? data.hosts : [];
        resetHostForm();
        els.hostActions.checked = false;
        await load({ refresh: true });
      } catch (error) {
        state.error = `Unable to save host. ${error.message}`;
      } finally {
        state.savingHost = false;
        render();
      }
    }

    function useCandidate(id) {
      const host = state.candidates.find((candidate) => candidate.id === id);
      if (!host) return;
      const sshTarget = splitSshTarget(host.ssh || "");
      state.editingHostId = "";
      els.hostId.value = host.id || "";
      els.hostLabel.value = host.label || host.id || "";
      els.hostSsh.value = sshTarget.ssh;
      els.hostPort.value = sshTarget.port;
      els.hostActions.checked = false;
      els.hostPassword.value = "";
      els.hostPassword.focus();
      render();
    }

    async function loadDetails(key, { quiet = false } = {}) {
      if (state.detailLoading) return;
      state.detailLoading = !quiet;
      if (!quiet) state.detailError = "";
      state.detailOlderError = "";
      render();
      try {
        const response = await fetch(sessionUrl(key, `/timeline?limit=${DETAIL_TIMELINE_LIMIT}`), { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Timeline request failed with HTTP ${response.status}`);
        const data = await response.json();
        if (state.detailKey === key) {
          state.detailTimeline = Array.isArray(data.timeline) ? data.timeline.slice(-DETAIL_TIMELINE_LIMIT).reverse() : [];
          state.detailBefore = Number.isInteger(data.next_before) ? data.next_before : null;
          state.detailHasMore = Boolean(data.has_more);
          state.detailError = data.error || "";
          state.detailTerminalCapture = data.terminal_capture || "";
          state.detailTerminalError = data.terminal_error || "";
          reconcilePendingMessages(key);
        }
      } catch (error) {
        if (!quiet && state.detailKey === key) state.detailError = error.message;
      } finally {
        state.detailLoading = false;
        if (state.detailKey === key) {
          render();
        }
      }
    }

    async function loadOlderDetails(key) {
      if (!key || state.detailLoading || state.detailLoadingMore || !state.detailHasMore || state.detailBefore === null) return;
      const previousScrollHeight = els.sessionChat.scrollHeight;
      const previousScrollTop = els.sessionChat.scrollTop;
      state.detailLoadingMore = true;
      state.detailOlderError = "";
      render();
      try {
        const url = sessionUrl(key, `/timeline?limit=${DETAIL_TIMELINE_LIMIT}&before=${encodeURIComponent(state.detailBefore)}`);
        const response = await fetch(url, { headers: { "Accept": "application/json" } });
        if (!response.ok) throw new Error(`Older timeline request failed with HTTP ${response.status}`);
        const data = await response.json();
        if (state.detailKey === key) {
          const olderRows = Array.isArray(data.timeline) ? data.timeline.slice(-DETAIL_TIMELINE_LIMIT).reverse() : [];
          state.detailTimeline = [...state.detailTimeline, ...olderRows];
          state.detailBefore = Number.isInteger(data.next_before) ? data.next_before : null;
          state.detailHasMore = Boolean(data.has_more);
          state.detailOlderError = data.error || "";
          reconcilePendingMessages(key);
        }
      } catch (error) {
        if (state.detailKey === key) state.detailOlderError = error.message;
      } finally {
        state.detailLoadingMore = false;
        if (state.detailKey === key) {
          render();
          window.requestAnimationFrame(() => {
            const heightDelta = els.sessionChat.scrollHeight - previousScrollHeight;
            els.sessionChat.scrollTop = previousScrollTop + Math.max(0, heightDelta);
          });
        }
      }
    }

    function schedulePendingDetailRefresh(key) {
      for (const delay of PENDING_DETAIL_REFRESH_DELAYS) {
        window.setTimeout(async () => {
          if (state.detailKey !== key || !hasPendingThinking(key)) return;
          await loadDetails(key, { quiet: true });
        }, delay);
      }
    }

    async function loadApprovals(key, { quiet = true } = {}) {
      const found = findSessionByKey(key);
      if (!found || found.host.host_id !== "local" || found.session.platform !== "codex") return;
      try {
        const response = await fetch(sessionUrl(key, "/approvals"), { headers: { "Accept": "application/json" } });
        if (!response.ok) {
          if (!quiet) throw new Error(`Approval request failed with HTTP ${response.status}`);
          return;
        }
        const data = await response.json();
        const approvals = Array.isArray(data.approvals) ? data.approvals : [];
        if (approvalSignature(state.approvals[key] || []) !== approvalSignature(approvals)) {
          state.approvals = { ...state.approvals, [key]: approvals };
          render();
        }
      } catch (error) {
        if (!quiet) {
          state.screenStatus = { ...state.screenStatus, [key]: error.message };
          render();
        }
      }
    }

    async function toggleDetails(key) {
      if (state.detailKey === key) {
        state.detailKey = "";
        resetDetailTimeline();
        render();
        return;
      }
      state.detailKey = key;
      resetDetailTimeline();
      await loadDetails(key);
      await loadApprovals(key);
    }

    async function openSessionPage(key) {
      if (!key) return;
      state.routeSessionKey = key;
      state.detailKey = key;
      resetDetailTimeline();
      window.history.pushState({ sessionKey: key }, "", sessionPageUrl(key));
      render();
      await loadDetails(key);
      await loadApprovals(key);
    }

    function closeSessionPage() {
      state.routeSessionKey = "";
      state.detailKey = "";
      resetDetailTimeline();
      window.history.pushState({}, "", `${appBasePath()}/`);
      render();
    }

    function sessionPageIsBeingUsed() {
      if (!state.routeSessionKey) return false;
      if (els.sessionPage.contains(document.activeElement)) return true;
      if ((state.screenInputs[state.routeSessionKey] || "").trim()) return true;
      const chat = els.sessionChat;
      if (!chat) return false;
      const distanceFromBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight;
      return distanceFromBottom > 96;
    }

    async function autoRefresh() {
      if (document.hidden || state.savingHost || state.screenSending || state.screenAssigning) return;
      if (sessionPageIsBeingUsed()) return;
      await load({ refresh: true, quiet: true });
      if (state.detailKey) await loadDetails(state.detailKey, { quiet: true });
      if (state.detailKey) await loadApprovals(state.detailKey, { quiet: true });
    }

    async function sendScreenInput(key) {
      const text = state.screenInputs[key] || "";
      if (!text.trim()) {
        state.screenStatus = { ...state.screenStatus, [key]: "Type a message before sending." };
        render();
        return;
      }
      const sentText = text.trim();
      addPendingCodexTurn(key, sentText, "Screen");
      state.screenInputs = { ...state.screenInputs, [key]: "" };
      state.screenSending = key;
      state.screenStatus = { ...state.screenStatus, [key]: "Sending to screen..." };
      render();
      if (state.detailKey === key) scrollSessionChatToBottom();
      try {
        const response = await fetch(sessionUrl(key, "/screen-input"), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ text: sentText }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Screen input failed with HTTP ${response.status}`);
        }
        state.screenStatus = { ...state.screenStatus, [key]: "Sent to screen. Waiting for screen update." };
        schedulePendingDetailRefresh(key);
      } catch (error) {
        removePendingCodexTurn(key, sentText);
        if (!(state.screenInputs[key] || "").trim()) {
          state.screenInputs = { ...state.screenInputs, [key]: sentText };
        }
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.screenSending = "";
        render();
      }
    }

    async function sendLocalInput(key) {
      const text = state.screenInputs[key] || "";
      if (!text.trim()) {
        state.screenStatus = { ...state.screenStatus, [key]: "Type a message before sending." };
        render();
        return;
      }
      state.screenSending = key;
      state.screenStatus = { ...state.screenStatus, [key]: "" };
      render();
      try {
        const response = await fetch(sessionUrl(key, "/local-input"), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Local input failed with HTTP ${response.status}`);
        }
        state.screenInputs = { ...state.screenInputs, [key]: "" };
        state.screenStatus = { ...state.screenStatus, [key]: "Sent to local tmux." };
        if (state.detailKey === key) {
          window.setTimeout(() => loadDetails(key, { quiet: true }), 1200);
        }
      } catch (error) {
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.screenSending = "";
        render();
      }
    }

    async function sendLocalCodexPrompt(key) {
      const text = state.screenInputs[key] || "";
      if (!text.trim()) {
        state.screenStatus = { ...state.screenStatus, [key]: "Type a message before sending." };
        render();
        return;
      }
      const sentText = text.trim();
      addPendingCodexTurn(key, sentText);
      state.screenInputs = { ...state.screenInputs, [key]: "" };
      state.screenSending = key;
      state.screenStatus = { ...state.screenStatus, [key]: "Codex is thinking..." };
      render();
      if (state.detailKey === key) scrollSessionChatToBottom();
      try {
        const response = await fetch(sessionUrl(key, "/local-codex-prompt"), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ text: sentText }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Local Codex prompt failed with HTTP ${response.status}`);
        }
        const data = await response.json();
        state.screenStatus = {
          ...state.screenStatus,
          [key]: data.mode === "app-server"
            ? "Sent to Codex. Waiting for transcript update."
            : "Local Codex response completed.",
        };
        window.setTimeout(() => load({ refresh: true, quiet: true }), 300);
        window.setTimeout(() => loadApprovals(key, { quiet: true }), 500);
        window.setTimeout(() => loadApprovals(key, { quiet: true }), 1800);
        schedulePendingDetailRefresh(key);
      } catch (error) {
        removePendingCodexTurn(key, sentText);
        if (!(state.screenInputs[key] || "").trim()) {
          state.screenInputs = { ...state.screenInputs, [key]: sentText };
        }
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.screenSending = "";
        render();
      }
    }

    async function resolveApproval(key, approvalId, decision) {
      state.approvalResolving = approvalId;
      state.screenStatus = { ...state.screenStatus, [key]: "Sending approval decision..." };
      render();
      try {
        const response = await fetch(sessionUrl(key, `/approvals/${encodeURIComponent(approvalId)}`), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ decision }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Approval failed with HTTP ${response.status}`);
        }
        const approvals = state.approvals[key] || [];
        state.approvals = { ...state.approvals, [key]: approvals.filter((row) => row.id !== approvalId) };
        state.screenStatus = { ...state.screenStatus, [key]: "Approval decision sent." };
        window.setTimeout(() => loadApprovals(key, { quiet: true }), 500);
        if (state.detailKey === key) window.setTimeout(() => loadDetails(key, { quiet: true }), 800);
      } catch (error) {
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.approvalResolving = "";
        render();
      }
    }

    async function sendScreenKey(key, action) {
      state.screenSending = key;
      state.screenStatus = { ...state.screenStatus, [key]: `Sending ${action} to screen...` };
      render();
      try {
        const response = await fetch(sessionUrl(key, "/screen-key"), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ action }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Screen key failed with HTTP ${response.status}`);
        }
        state.screenStatus = { ...state.screenStatus, [key]: `Sent ${action} to screen.` };
        window.setTimeout(() => load({ refresh: true, quiet: true }), 400);
        if (state.detailKey === key) window.setTimeout(() => loadDetails(key, { quiet: true }), 900);
      } catch (error) {
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.screenSending = "";
        render();
      }
    }

    function sendFromSessionTextarea(target) {
      const screenKey = target.getAttribute("data-session-screen-input");
      if (screenKey) {
        sendScreenInput(screenKey);
        return;
      }
      const localKey = target.getAttribute("data-session-local-input");
      if (localKey) {
        sendLocalInput(localKey);
        return;
      }
      const localCodexKey = target.getAttribute("data-session-local-codex-input");
      if (localCodexKey) {
        sendLocalCodexPrompt(localCodexKey);
      }
    }

    async function openLocalResume(key) {
      state.screenSending = key;
      state.screenStatus = { ...state.screenStatus, [key]: "" };
      render();
      try {
        const response = await fetch(sessionUrl(key, "/local-resume"), {
          method: "POST",
          headers: { "Accept": "application/json" },
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Local resume failed with HTTP ${response.status}`);
        }
        state.screenStatus = { ...state.screenStatus, [key]: "Opened local resume terminal." };
      } catch (error) {
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.screenSending = "";
        render();
      }
    }

    function setSessionScreen(key, screenSession) {
      state.hosts = state.hosts.map((host) => ({
        ...host,
        sessions: (host.sessions || []).map((session) => (
          session.key === key ? { ...session, screen_session: screenSession || null } : session
        )),
      }));
    }

    async function assignScreen(key, screenSession) {
      state.screenAssigning = key;
      state.screenStatus = { ...state.screenStatus, [key]: "" };
      render();
      try {
        const response = await fetch(sessionUrl(key, "/screen-assignment"), {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ screen_session: screenSession }),
        });
        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.detail || `Screen assignment failed with HTTP ${response.status}`);
        }
        const data = await response.json();
        setSessionScreen(key, data.screen_session || "");
        state.screenStatus = { ...state.screenStatus, [key]: data.screen_session ? `Assigned ${data.screen_session}` : "Screen assignment cleared." };
      } catch (error) {
        state.screenStatus = { ...state.screenStatus, [key]: error.message };
      } finally {
        state.screenAssigning = "";
        render();
      }
    }

    els.query.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    els.status.addEventListener("change", (event) => {
      state.status = event.target.value;
      render();
    });

    els.newHost.addEventListener("change", (event) => {
      state.newSessionHost = event.target.value;
      render();
    });

    els.newCwd.addEventListener("input", (event) => {
      state.newSessionCwd = event.target.value;
    });

    els.newScreen.addEventListener("input", (event) => {
      state.newSessionScreen = event.target.value;
    });

    els.refresh.addEventListener("click", () => load({ refresh: true }));
    els.newSession.addEventListener("click", startRemoteCodexSession);
    els.notifyCompleted.addEventListener("change", (event) => setNotifyCompleted(event.target.checked));
    els.testNotify.addEventListener("click", testNotification);
    els.completionPopupClose.addEventListener("click", () => {
      window.clearTimeout(state.completionPopupTimer);
      els.completionPopup.classList.remove("show");
    });
    els.toggleAdd.addEventListener("click", () => {
      state.addOpen = !state.addOpen;
      render();
      if (state.addOpen) loadConfiguredHosts();
    });
    els.loadCandidates.addEventListener("click", loadCandidates);
    els.saveHost.addEventListener("click", saveHost);
    els.cancelEdit.addEventListener("click", resetHostForm);
    els.hostList.addEventListener("click", (event) => {
      const editButton = event.target.closest("[data-edit-host]");
      if (editButton) {
        editHost(editButton.getAttribute("data-edit-host"));
        return;
      }
      const deleteButton = event.target.closest("[data-delete-host]");
      if (deleteButton) {
        deleteConfiguredHost(deleteButton.getAttribute("data-delete-host"));
      }
    });
    els.candidateList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-candidate]");
      if (!button) return;
      useCandidate(button.getAttribute("data-candidate"));
    });

    els.hosts.addEventListener("click", (event) => {
      const detailButton = event.target.closest("[data-detail]");
      if (detailButton) {
        openSessionPage(detailButton.getAttribute("data-detail"));
        return;
      }
      const screenButton = event.target.closest("[data-screen-send]");
      if (screenButton) {
        sendScreenInput(screenButton.getAttribute("data-screen-send"));
        return;
      }
      const screenKeyButton = event.target.closest("[data-session-screen-key]");
      if (screenKeyButton) {
        sendScreenKey(
          screenKeyButton.getAttribute("data-session-screen-key"),
          screenKeyButton.getAttribute("data-screen-action")
        );
        return;
      }
      const approvalButton = event.target.closest("[data-approval-decision]");
      if (approvalButton) {
        resolveApproval(
          approvalButton.getAttribute("data-approval-decision"),
          approvalButton.getAttribute("data-approval-id"),
          approvalButton.getAttribute("data-decision")
        );
        return;
      }
      const localButton = event.target.closest("[data-local-send]");
      if (localButton) {
        sendLocalInput(localButton.getAttribute("data-local-send"));
        return;
      }
      const localResumeButton = event.target.closest("[data-local-resume]");
      if (localResumeButton) {
        openLocalResume(localResumeButton.getAttribute("data-local-resume"));
        return;
      }
      const button = event.target.closest("[data-copy]");
      if (!button) return;
      copyText(button.getAttribute("data-copy"), button.getAttribute("data-key"));
    });

    els.hosts.addEventListener("input", (event) => {
      const input = event.target.closest("[data-screen-input]");
      const localInput = event.target.closest("[data-local-input]");
      const target = input || localInput;
      if (!target) return;
      const key = target.getAttribute(input ? "data-screen-input" : "data-local-input");
      state.screenInputs = { ...state.screenInputs, [key]: target.value };
    });

    els.hosts.addEventListener("change", (event) => {
      const select = event.target.closest("[data-screen-select]");
      if (!select) return;
      assignScreen(select.getAttribute("data-screen-select"), select.value);
    });

    els.sessionPage.addEventListener("click", (event) => {
      if (event.target.closest("[data-session-back]")) {
        closeSessionPage();
        return;
      }
      if (event.target.closest("[data-session-refresh]")) {
        load({ refresh: true });
        if (state.detailKey) loadDetails(state.detailKey, { quiet: true });
        if (state.detailKey) loadApprovals(state.detailKey, { quiet: true });
        return;
      }
      const screenButton = event.target.closest("[data-session-screen-send]");
      if (screenButton) {
        sendScreenInput(screenButton.getAttribute("data-session-screen-send"));
        return;
      }
      const screenKeyButton = event.target.closest("[data-session-screen-key]");
      if (screenKeyButton) {
        sendScreenKey(
          screenKeyButton.getAttribute("data-session-screen-key"),
          screenKeyButton.getAttribute("data-screen-action")
        );
        return;
      }
      const approvalButton = event.target.closest("[data-approval-decision]");
      if (approvalButton) {
        resolveApproval(
          approvalButton.getAttribute("data-approval-decision"),
          approvalButton.getAttribute("data-approval-id"),
          approvalButton.getAttribute("data-decision")
        );
        return;
      }
      const localButton = event.target.closest("[data-session-local-send]");
      if (localButton) {
        sendLocalInput(localButton.getAttribute("data-session-local-send"));
        return;
      }
      const localCodexButton = event.target.closest("[data-session-local-codex-send]");
      if (localCodexButton) {
        sendLocalCodexPrompt(localCodexButton.getAttribute("data-session-local-codex-send"));
        return;
      }
      const localResumeButton = event.target.closest("[data-session-local-resume]");
      if (localResumeButton) {
        openLocalResume(localResumeButton.getAttribute("data-session-local-resume"));
      }
    });

    els.sessionPage.addEventListener("input", (event) => {
      const input = event.target.closest("[data-session-screen-input]");
      const localInput = event.target.closest("[data-session-local-input]");
      const localCodexInput = event.target.closest("[data-session-local-codex-input]");
      const target = input || localInput || localCodexInput;
      if (!target) return;
      const key = target.getAttribute(
        input
          ? "data-session-screen-input"
          : localInput
            ? "data-session-local-input"
            : "data-session-local-codex-input"
      );
      state.screenInputs = { ...state.screenInputs, [key]: target.value };
    });

    els.sessionPage.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" || event.shiftKey) return;
      const target = event.target.closest(
        "[data-session-screen-input], [data-session-local-input], [data-session-local-codex-input]"
      );
      if (!target || target.disabled || state.screenSending) return;
      event.preventDefault();
      sendFromSessionTextarea(target);
    });

    els.sessionChat.addEventListener("scroll", () => {
      if (!state.routeSessionKey || !state.detailHasMore || state.detailLoading || state.detailLoadingMore) return;
      if (els.sessionChat.scrollTop <= 48) {
        loadOlderDetails(state.routeSessionKey);
      }
    });

    els.sessionPage.addEventListener("change", (event) => {
      const select = event.target.closest("[data-session-screen-select]");
      if (!select) return;
      assignScreen(select.getAttribute("data-session-screen-select"), select.value);
    });

    window.addEventListener("popstate", async () => {
      const key = routeSessionKey();
      state.routeSessionKey = key;
      state.detailKey = key;
      resetDetailTimeline();
      render();
      if (key) {
        await loadDetails(key);
        await loadApprovals(key);
      }
    });

    window.setInterval(autoRefresh, AUTO_REFRESH_MS);
    window.setInterval(() => {
      if (state.routeSessionKey) loadApprovals(state.routeSessionKey, { quiet: true });
    }, 3_000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) autoRefresh();
    });

    async function init() {
      state.routeSessionKey = routeSessionKey();
      state.detailKey = state.routeSessionKey;
      await loadSettings();
      await loadConfiguredHosts(false);
      await load();
      if (state.detailKey) {
        await loadDetails(state.detailKey);
        await loadApprovals(state.detailKey);
      }
    }

    init();
  </script>
</body>
</html>
